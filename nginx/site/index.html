<!DOCTYPE html>
<html>
<head>
  <title>testelchin.com</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background-color: #0a0e1a;
      color: #e0e6f0;
      font-family: 'Courier New', monospace;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .container {
      text-align: center;
      border: 1px solid #1e90ff;
      padding: 60px 80px;
      box-shadow: 0 0 40px rgba(30, 144, 255, 0.3);
    }
    .quote {
      font-size: 1em;
      color: #7eb8ff;
      font-style: italic;
      line-height: 1.8;
      margin-bottom: 30px;
    }
    .link {
      margin-top: 20px;
    }
    .link a {
      color: #1e90ff;
      text-decoration: none;
      letter-spacing: 2px;
      font-size: 0.85em;
    }
    .link a:hover {
      color: #7eb8ff;
    }
  </style>
</head>
<body>
  <div class="container">
    <p class="quote">
      "Stress primarily comes from not taking action<br>
      over something that you can have control over."<br>
      - Jeff Bezos
    </p>
    <div class="link">
      <a href="/universe">explore the universe -></a>
    </div>
  </div>
</body>
</html>
