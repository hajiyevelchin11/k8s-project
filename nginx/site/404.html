<!DOCTYPE html>
<html>
<head>
  <title>404 - Not Found</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background-color: #0a0e1a;
      color: #e0e6f0;
      font-family: 'Courier New', monospace;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .container { text-align: center; }
    h1 { font-size: 6em; color: #1e90ff; }
    p { color: #7eb8ff; margin-top: 20px; }
    a { color: #1e90ff; text-decoration: none; display: block; margin-top: 20px; }
  </style>
</head>
<body>
  <div class="container">
    <h1>404</h1>
    <p>This page does not exist.</p>
    <a href="/">go back home</a>
  </div>
</body>
</html>
