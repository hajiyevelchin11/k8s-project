<!DOCTYPE html>
<html>
<head>
  <title>Universe</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background-image: url('/universe/bg.jpg');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .quote {
      text-align: center;
      color: white;
      font-family: 'Courier New', monospace;
      font-size: 1.3em;
      font-style: italic;
      line-height: 2;
      text-shadow: 0 0 20px rgba(0,0,0,0.8);
      padding: 40px;
      background: rgba(0,0,0,0.3);
    }
    .back a {
      color: #ccccff;
      text-decoration: none;
      font-size: 0.8em;
      letter-spacing: 2px;
      display: block;
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <div class="quote">
    "The universe is under no obligation<br>
    to make sense to you."<br>
    - Neil deGrasse Tyson
    <div class="back">
      <a href="/"><- back</a>
    </div>
  </div>
</body>
</html>
