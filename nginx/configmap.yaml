apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-html
  namespace: default
data:
  index.html: |
    <!DOCTYPE html>
    <html>
    <head>
      <title>Elchin Hajiyev</title>
      <style>
        * {
          margin: 0;
          padding: 0;
          box-sizing: border-box;
        }
        body {
          background-color: #0a0e1a;
          color: #e0e6f0;
          font-family: 'Courier New', monospace;
          display: flex;
          justify-content: center;
          align-items: center;
          height: 100vh;
        }
        .quote {
          text-align: center;
          font-size: 1.2em;
          color: #7eb8ff;
          font-style: italic;
          letter-spacing: 1px;
          line-height: 2;
        }
      </style>
    </head>
    <body>
      <div class="quote">
        "Stress primarily comes from not taking action<br>
        over something that you can have control over."<br>
        - Jeff Bezos
      </div>
    </body>
    </html>
