proxy_cache_path /tmp/nginx_cache levels=1:2 keys_zone=my_cache:10m max_size=100m inactive=60m use_temp_path=off;

server {
    listen 80;
    server_name testelchin.com www.testelchin.com;

    absolute_redirect off;

    add_header X-Served-By "testelchin-k3s-amsterdam";

    location / {
        root /usr/share/nginx/html;
        index index.html;
        add_header Cache-Control "public, max-age=3600";
        add_header X-Cache-Status $upstream_cache_status;
    }

    location /universe/ {
        root /usr/share/nginx/html;
        index index.html;
        add_header Cache-Control "public, max-age=86400";
        add_header X-Cache-Status $upstream_cache_status;
    }
}
